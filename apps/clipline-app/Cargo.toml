[package]
name = "clipline-app"
version = "0.1.0"
edition.workspace = true
license.workspace = true

# Tauri (and through it webkit2gtk on Linux) is Windows-gated: capture and
# encode are platform-bound anyway, and ubuntu CI must build without
# system webview libraries. Non-Windows targets get a stub main.
[target.'cfg(windows)'.dependencies]
clipline-capture = { path = "../../crates/clipline-capture" }
clipline-events = { path = "../../crates/clipline-events" }
clipline-lol = { path = "../../crates/clipline-lol" }
clipline-mp4 = { path = "../../crates/clipline-mp4" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { version = "2", features = ["tray-icon", "protocol-asset"] }
tauri-plugin-global-shortcut = "2"

[build-dependencies]
tauri-build = { version = "2", features = [] }
