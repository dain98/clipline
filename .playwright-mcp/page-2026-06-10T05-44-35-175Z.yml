        - article [ref=e50]:
          - generic [ref=e51]:
            - heading "Production Key Applications" [level=1] [ref=e52]
            - generic [ref=e55]:
              - generic [ref=e56]:
                - time [ref=e57]: 1 year ago
                - text: ·
              - text: Updated
          - generic [ref=e60]:
            - heading "Why do I need a website for a production key?" [level=3] [ref=e61]
            - paragraph [ref=e62]: Production keys are reserved for fully functioning applications that can clearly demonstrate their user flows. We need to see a website to understand what your app does, view your Terms of Service and Privacy Policy, and to make sure your app is in a good state for a production key.
            - heading "Can I have a production key if I don’t have a website?" [level=3] [ref=e63]
            - paragraph [ref=e64]: In most cases, no. Production keys are for applications that are in a completed or near-complete state. If you’re very early in the development process, we recommend applying for a personal key to get you started.
            - heading "Can I submit my Github for a production key?" [level=3] [ref=e65]
            - paragraph [ref=e66]: No. Unfortunately, we are unable to accept Github repositories and source code in lieu of a functioning application/site.
            - heading "I have a functioning mobile app, but no website, can I still have a production key?" [level=3] [ref=e67]
            - paragraph [ref=e68]: In most cases, we still require you to host your native app on a domain you own. This is so that users can easily see what your product does, where to download it, where you list your Terms of Service and Privacy Policy, and so we can verify that you’re the owner of the app. If you plan to host your app, ToS and Privacy Policy on an app store instead, it must first be in a verified state and approved by us in the developer portal.
            - heading "My product is a Discord bot, do I still need a website?" [level=3] [ref=e69]
            - paragraph [ref=e70]: Yes. Discord bots still need a website so users can easily see what your product does, where to access it, and where you list your Terms of Service and Privacy Policy, and so we can verify your app.
            - heading "How can I show you what I’m going to develop without an API key?" [level=3] [ref=e71]
            - paragraph [ref=e72]:
              - text: There are a lot of ways. If you are developing for League of Legends, Teamfight Tactics, or Legends of Runeterra, you can request a personal key to help get you started. We don’t offer personal keys for VALORANT, but you can create the framework of your site using placeholder data or a developer key. Other ways are video demos, screenshots, or Figma files that clearly demonstrate your user flow. Try reaching out to the
              - link "community Discord" [ref=e73] [cursor=pointer]:
                - /url: https://web.archive.org/web/20251012013734/https://discord.gg/riotgamesdevrel
              - text: if you need more tips!
